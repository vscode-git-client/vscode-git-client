<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Trunk from root commit up to fork point -->
  <line x1="64" y1="108" x2="64" y2="60" stroke="#58a6ff" stroke-width="7" stroke-linecap="round"/>
  <!-- Left branch curves up-left (feature-1, green) -->
  <path d="M64 60 C64 44, 28 44, 28 28" stroke="#3fb950" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Right branch curves up-right (feature-2, orange) -->
  <path d="M64 60 C64 44, 100 44, 100 28" stroke="#f0883e" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Centre top continues main (blue) -->
  <line x1="64" y1="60" x2="64" y2="20" stroke="#58a6ff" stroke-width="7" stroke-linecap="round"/>
  <!-- Root commit -->
  <circle cx="64" cy="104" r="10" fill="#0d1117" stroke="#58a6ff" stroke-width="6"/>
  <!-- Main tip commit -->
  <circle cx="64" cy="16" r="10" fill="#0d1117" stroke="#58a6ff" stroke-width="6"/>
  <!-- Feature-1 tip commit (green) -->
  <circle cx="28" cy="24" r="10" fill="#0d1117" stroke="#3fb950" stroke-width="6"/>
  <!-- Feature-2 tip commit (orange) -->
  <circle cx="100" cy="24" r="10" fill="#0d1117" stroke="#f0883e" stroke-width="6"/>
</svg>
