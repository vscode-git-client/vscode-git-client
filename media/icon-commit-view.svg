<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Commit node -->
  <circle cx="64" cy="22" r="13" fill="#0d1117" stroke="#58a6ff" stroke-width="7"/>
  <!-- Short vertical stem below commit -->
  <line x1="64" y1="35" x2="64" y2="48" stroke="#58a6ff" stroke-width="6" stroke-linecap="round"/>
  <!-- Divider line -->
  <line x1="14" y1="54" x2="114" y2="54" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- File rows: green added lines (left), red removed lines (right) -->
  <!-- Row 1 -->
  <line x1="14" y1="68" x2="72" y2="68" stroke="#3fb950" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="68" x2="114" y2="68" stroke="#f85149" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  <!-- Row 2 -->
  <line x1="14" y1="82" x2="58" y2="82" stroke="#3fb950" stroke-width="5" stroke-linecap="round"/>
  <line x1="66" y1="82" x2="104" y2="82" stroke="#f85149" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
  <!-- Row 3 -->
  <line x1="14" y1="96" x2="86" y2="96" stroke="#3fb950" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- Row 4 -->
  <line x1="14" y1="110" x2="48" y2="110" stroke="#f85149" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="56" y1="110" x2="90" y2="110" stroke="#3fb950" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
</svg>
