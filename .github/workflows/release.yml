name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm run compile

      - name: Package extension
        run: pnpm dlx @vscode/vsce package --no-dependencies

      - name: Get VSIX filename
        id: vsix
        run: echo "file=$(ls *.vsix)" >> $GITHUB_OUTPUT

      - name: Publish to VS Code Marketplace
        run: pnpm dlx @vscode/vsce publish --no-dependencies --packagePath ${{ steps.vsix.outputs.file }}
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}

      - name: Publish to Open VSX
        run: pnpm dlx ovsx publish ${{ steps.vsix.outputs.file }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.file }}
          generate_release_notes: true
